               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' data: https: blob: https://*.supabase.co https://*.supabase.storage;
               connect-src 'self' 
                 https://*.supabase.co 
                 https://*.supabase.rest 
                 https://*.supabase.storage 
                 https://*.supabase.auth

                 ws://localhost:* 
                 http://localhost:*;
               manifest-src 'self';
               frame-src 'self' https://*.supabase.co;

    <!-- 🔹 Service Worker registration status (опционально, для отладки) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.ready.then(function(registration) {
            console.log('[SW] Service Worker готов:', registration);
          }).catch(function(err) {
            console.warn('[SW] Ошибка регистрации:', err);
          });
        });
      }
    </script>
    
    <!-- 🔹 Стили скелетона (инлайн для мгновенной загрузки) -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      #root-skeleton {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f9fafb;
        transition: opacity 0.3s ease-in-out;
      }
      .dark #root-skeleton {
        background: #0f172a;
      }
      .skeleton-content {
        text-align: center;
        max-width: 400px;
        padding: 20px;
      }
      .skeleton-loader {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }
      .skeleton-title {
        color: #1f2937;
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 8px 0;
        line-height: 1.3;
      }
      .dark .skeleton-title {
        color: #f1f5f9;
      }
      .skeleton-subtitle {
        color: #6b7280;
        font-size: 14px;
        margin: 0;
        line-height: 1.4;
      }
      .dark .skeleton-subtitle {
        color: #94a3b8;
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton-loader {
          animation: none;
          opacity: 0.7;
        }
      }
      /* Скрытие скелетона после загрузки */
      .app-loaded #root-skeleton {
        display: none;
      }
    </style>

  <body>
    <!-- Скелетон для лучшего UX при загрузке -->
    <div id="root">
      <div id="root-skeleton">
        <div class="skeleton-content">
          <div class="skeleton-loader"></div>
          <h1 class="skeleton-title">Загрузка Реглай...</h1>
          <p class="skeleton-subtitle">Система управления заявками на материалы</p>
        </div>
      </div>
    </div>
    
    <!-- Основной скрипт приложения (всё остальное — в main.jsx) -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- 🔹 Минимальный скрипт: только updateThemeColor (регистрация SW — в main.jsx) -->
    <script>
      // ✅ Глобальная функция для обновления theme-color (вызывается из JS при смене темы)
      window.updateThemeColor = function(isDark) {
        const meta = document.getElementById('theme-color-meta');
        if (meta) {
          meta.setAttribute('content', isDark ? '#1e293b' : '#3b82f6');
        }
        // Для iOS: изменение стиля статус-бара
        const appleMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (appleMeta) {
          appleMeta.setAttribute('content', isDark ? 'black-translucent' : 'default');
        }
      };
    </script>
