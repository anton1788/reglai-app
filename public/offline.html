<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Реглай — офлайн</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      text-align: center;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      color: #1f2937;
    }
    
    .container {
      max-width: 400px;
      background: white;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid #e5e7eb;
    }
    
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #1f2937;
    }
    
    p {
      font-size: 1rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #4A6572;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
    }
    
    .btn:hover {
      background: #344955;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .status {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #9ca3af;
    }
    
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }
    
    .status .dot.offline {
      background: #ef4444;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    
    .feature {
      background: #f3f4f6;
      padding: 0.75rem 0.5rem;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #4b5563;
    }
    
    .feature span {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 1.5rem 1rem;
      }
      
      .features {
        grid-template-columns: 1fr 1fr;
      }
      
      h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">📴</span>
    <h1>Нет подключения к интернету</h1>
    <p>Вы можете продолжать работать — все данные будут отправлены автоматически при восстановлении связи.</p>
    
    <div class="features">
      <div class="feature">
        <span>📝</span>
        Создание заявок
      </div>
      <div class="feature">
        <span>💾</span>
        Автосохранение
      </div>
      <div class="feature">
        <span>🔄</span>
        Синхронизация
      </div>
    </div>
    
    <button class="btn" onclick="window.location.reload()">
      🔄 Попробовать снова
    </button>
    
    <div class="status">
      <span class="dot offline"></span>
      Офлайн-режим активен
    </div>
  </div>
</body>
</html>
